services:
  ratesignal-frontend:
    build:
      context: ./frontend
      dockerfile: dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - API_PROXY_TARGET=http://ratesignal-backend:9000
  ratesignal-backend:
    build:
      context: ./backend
      dockerfile: dockerfile
    ports:
      - "9000:9000"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    env_file:
      - ./backend/.env
volumes:
  frontend_node_modules:
  backend_node_modules:
